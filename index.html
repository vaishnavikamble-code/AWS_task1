<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Project</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
            opacity: 0.9;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
            color: white;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Hello from AWS Deployment!</h1>
        <p>This website is deployed automatically using GitHub Actions.</p>

        <button onclick="showMessage()">Click Me</button>
        <p id="msg"></p>
    </div>

    <footer>
        Made with by GitHub + AWS
    </footer>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML =
                "🎉 Deployment Successful!";
        }
    </script>

</body>
</html>
